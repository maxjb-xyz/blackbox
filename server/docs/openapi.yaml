      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                type: object
                required: [ok, response]
                properties:
                  ok:
                    type: boolean
                  response:
                    type: string
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: AI endpoint unreachable or returned an error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

