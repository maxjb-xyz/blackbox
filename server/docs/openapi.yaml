                $ref: "#/components/schemas/Error"

  /api/admin/settings/ai/test:
    post:
      tags: [Admin — Config]
      summary: Test AI connectivity
      description: Sends a trivial prompt to the configured AI endpoint and returns the response.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ai_provider:
                  type: string
