          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationDest"

  /api/admin/notifications/{id}:
    put:
      tags: [Admin — Notifications]
      summary: Update a notification destination
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum: [discord, slack, ntfy]
                url:
                  type: string
                  format: uri
                events:
                  type: array
                  items:
                    type: string
