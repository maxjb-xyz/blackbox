  # ── WebSocket ─────────────────────────────────────────────────────────────

  /api/ws:
    get:
      tags: [WebSocket]
      summary: Real-time event stream
      description: |
        Upgrades the connection to WebSocket. The server pushes JSON messages as events occur.

        **Message types:**

        | type | payload | Description |
        |------|---------|-------------|
        | `entry` | `Entry` | A new entry was ingested |
        | `entry_replaced` | `Entry` | A Docker restart replaced an existing entry |
        | `node_status` | `{online: number, total: number}` | Node connectivity changed |
        | `invalidate_user` | — | Your session was invalidated; re-authenticate |

        The server sends a ping every 30 seconds. Maximum 8 connections per user,
        64 per IP address.
      security:
        - sessionCookie: []
      responses:
        "101":
          description: Switching Protocols
        "401":
          description: Not authenticated
