                  default: ollama
                ai_url:
                  type: string
                  format: uri
                ai_model:
                  type: string
                ai_api_key:
                  type: string
                  description: Omit to keep the existing stored key
                ai_clear_api_key:
                  type: boolean
                  description: Set to true to remove the stored API key
                ai_mode:
                  type: string
                  enum: [analysis, enhanced]
                  default: analysis
